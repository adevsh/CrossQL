services:
  # Placeholder for other databases
  mysql:
    image: percona/percona-server:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crossql
      MYSQL_USER: crossql
      MYSQL_PASSWORD: crossql
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - crossql-network
  postgresql:
    image: percona/percona-distribution-postgresql:18.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crossql
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crossql-network
  mongodb:
    image: percona/percona-server-mongodb:8.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/var/lib/mongodb
    networks:
      - crossql-network
  cassandra:
    image: cassandra:5.0
    environment:
      CASSANDRA_CLUSTER_NAME: crossql
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - crossql-network
  crossql-engine:
    profiles: ["engine"]
    image: rust:1.89
    working_dir: /workspace
    command: >
      sh -c "cargo run -p crossql-engine"
    environment:
      CROSSQL_API_KEY: ${CROSSQL_API_KEY:-test-key}
      CROSSQL_OUTPUT_DIR: /tmp/crossql-output
      CROSSQL_PORT: 7070
    ports:
      - "7070:7070"
    volumes:
      - ./:/workspace
    networks:
      - crossql-network
  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - crossql-network
  grafana:
    profiles: ["observability"]
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - crossql-network

volumes:
  mysql_data:
    driver: local
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  cassandra_data:
    driver: local
  grafana_data:
    driver: local

networks:
  crossql-network:
    driver: bridge
