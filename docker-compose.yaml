services:
  # Placeholder for other databases
  mysql:
    image: percona/percona-server:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crossql
      MYSQL_USER: crossql
      MYSQL_PASSWORD: crossql
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - crossql-network
  postgresql:
    image: percona/percona-distribution-postgresql:18.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crossql
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crossql-network
  mongodb:
    image: percona/percona-server-mongodb:8.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/var/lib/mongodb
    networks:
      - crossql-network
  cassandra:
    image: cassandra:5.0
    environment:
      CASSANDRA_CLUSTER_NAME: crossql
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - crossql-network

volumes:
  mysql_data:
    driver: local
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  cassandra_data:
    driver: local

networks:
  crossql-network:
    driver: bridge